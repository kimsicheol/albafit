function typeRank(profile) {
  return CHARACTERS.map(c => {
    let d = 0;
    TRAITS.forEach(({ key }) => { d += Math.abs(profile[key] - c.vec[key]); });
    return { ...c, dist: d, matchPct: Math.max(40, Math.round(100 - d / 5)) };
  }).sort((a, b) => a.dist - b.dist);
}
function compat(idA, idB) {
  if (!idA || !idB) return { bonus: 0, label: null };
  const A = CHAR_BY_ID[idA], B = CHAR_BY_ID[idB];
  if (A.goodWith.includes(idB) || B.goodWith.includes(idA)) return { bonus: 5, label: "궁합 💚 +5" };
  if (A.hardWith === idB || B.hardWith === idA) return { bonus: -5, label: "티격태격 ⚡ −5" };
  return { bonus: 0, label: null };
}

function bossProfileFrom(answers) {
  const p = { routine: 50, detail: 50, people: 50, energy: 50, learning: 50 };
  BOSS_QUIZ.forEach((qz, i) => {

    Object.entries(qz.eff[pick]).forEach(([k, v]) => { p[k] = Math.max(0, Math.min(100, p[k] + v)); });

}

  // 애매한 축(probe)을 앞에 배치
  return items.sort((x, y) => (x.kind === "probe" ? 0 : 1) - (y.kind === "probe" ? 0 : 1));
}

function fitScore(user, req) {
  let num = 0, den = 0;
  TRAITS.forEach(({ key }) => {
    const r = req[key], u = user[key];
    const w = 0.4 + r / 100;
    const gap = u < r ? (r - u) : (u - r) * 0.4;
    num += gap * w; den += w;
  });
  return Math.min(99, Math.max(0, Math.round(100 - (num / den) * 1.6)));
}
function prefScore(prefs, cond) {
  let hit = 0, tot = 0, matched = [];
  ["time", "term"].forEach(key => {
    const p = prefs[key];
    if (!p) return;
    tot += 1;
    if (p === "무관" || cond[key] === "무관" || p === cond[key]) { hit += 1; if (p !== "무관") matched.push(p); }
  });
  return { score: tot ? Math.round((hit / tot) * 100) : 100, matched };
}
// 맞춤 조건(적응형 문항) 일치 시 +3점씩 (최대 +6)
function adaptiveBonus(prefs, attrs) {
  let bonus = 0; const matched = [];
  ["svc", "pace", "mat", "load", "nov"].forEach(k => {
    const p = prefs[k];
    if (!p || p === "무관") return;
    if (attrs[k] === p) { bonus += 3; matched.push(p); }
  });
  return { bonus, matched };
}
// Q3: '적성 우선'과 '고시급' 응답자는 다른 사용자 그룹 — 그룹별 매칭 프로파일
function payProfile(payPref) {
  if (payPref === "금액보다 적성 우선")
    return { label: "적성 우선형 · 적성 60% 가중", wf: 0.6, wd: 0.3, wp: 0.1, meetBonus: 0, missNear: 4, missFar: 8 };
  if (payPref === "15,000원 이상" || payPref === "18,000원 이상")
    return { label: "고시급 집중형 · 시급 조건 강화", wf: 0.45, wd: 0.2, wp: 0.15, meetBonus: 12, missNear: 14, missFar: 25 };
  return { label: "균형형", wf: 0.5, wd: 0.3, wp: 0.2, meetBonus: 0, missNear: 8, missFar: 15 };
}
function payPenalty(prefs, payNum, pp) {
  const min = PAY_MIN[prefs.pay] || 0;
  if (!min || payNum >= min) return 0;
  return payNum >= min * 0.9 ? pp.missNear : pp.missFar; // 희망액의 90% 이상이면 근소 미달
}
function payMeet(prefs, payNum, pp) {
  const min = PAY_MIN[prefs.pay] || 0;
  return min && payNum >= min ? pp.meetBonus : 0;
}
function totalScore(fit, walk, pref, penalty, compatBonus) {
  return Math.max(0, Math.min(99, Math.round(fit * 0.5 + distScore(walk) * 0.3 + pref * 0.2 - penalty + compatBonus)));
}
function tenureMonths(score) {
  return Math.max(2, Math.min(14, Math.round(2 + ((score - 45) / 55) * 12)));
}
function scoreColor(s) { return s >= 80 ? C.company : s >= 60 ? C.gold : C.warn; }

    .teaser-emoji { animation: wobble 2.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  `;

  const DongPicker = ({ value, onChange, accent }) => (
    <label style={{ display: "inline-flex", alignItems: "center", gap: 6, background: C.paper, border: `1.5px solid ${accent}`, borderRadius: 999, padding: "6px 12px", cursor: "pointer" }}>
      <span style={{ fontSize: 13 }}>📍</span>
      <select value={value} onChange={e => onChange(e.target.value)} style={{ border: "none", background: "transparent", fontFamily: font, fontSize: 13.5, fontWeight: 800, color: accent, cursor: "pointer", outline: "none" }}>
        {DONG_LIST.map(d => <option key={d} value={d}>{d}</option>)}
      </select>
    </label>
  );

  const Header = (
    <div style={{ width: "100%", maxWidth: 880, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 20px 6px", gap: 10, flexWrap: "wrap" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, cursor: "pointer" }} onClick={() => setMode("home")}>
        <span style={{ fontSize: 32, fontWeight: 900, letterSpacing: -1.2, lineHeight: 1 }}>
          알바<span style={{ background: `linear-gradient(90deg, ${C.local}, ${C.worker})`, WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>핏</span>
        </span>
        <span style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>우리 동네 적성 매칭</span>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <DongPicker value={myDong} onChange={setMyDong} accent={C.local} />
        {mode !== "home" && (
          <button onClick={() => setMode("home")} style={{ background: "transparent", border: `1px solid ${C.line}`, borderRadius: 10, padding: "7px 14px", fontSize: 13, fontWeight: 600, color: C.sub, cursor: "pointer", fontFamily: font }}>처음으로</button>
        )}
      </div>
    </div>
  );

  // ================= 홈 =================
  if (mode === "home") {
    const nearCnt = JOBS.filter(j => walkMin(myDong, j.dong) <= 15).length;
    const ticker = JOBS.map(j => `📍${j.dong} ${j.title} · ${j.pay} · 도보 ${walkMin(myDong, j.dong)}분`).join("      ");
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 880, padding: "18px 20px 60px" }}>
          <div style={{
            borderRadius: 26, padding: "52px 34px 0", color: "#fff", position: "relative", overflow: "hidden",
            background: "linear-gradient(135deg, #0D1220 0%, #141B33 45%, #241333 100%)",
            backgroundSize: "200% 200%", animation: "shimmer 12s ease infinite",
          }}>
            <div style={{ position: "absolute", right: -60, top: -70, width: 340, height: 340, borderRadius: "50%", background: "radial-gradient(circle, rgba(255,111,30,.5), transparent 65%)", animation: "drift 9s ease-in-out infinite", filter: "blur(6px)" }} />
            <div style={{ position: "absolute", left: -80, bottom: -60, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(46,86,232,.55), transparent 65%)", animation: "drift2 11s ease-in-out infinite", filter: "blur(8px)" }} />
            <div style={{ position: "relative" }}>
              <div className="hero-line" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,.1)", border: "1px solid rgba(255,255,255,.18)", borderRadius: 999, padding: "7px 16px", fontSize: 13, fontWeight: 800 }}>
                📍 {myDong} · 동네 인증 알바 매칭 · 지금 도보 15분 내 <span style={{ color: C.gold }}>{nearCnt}건</span>
              </div>
              <h1 className="hero-line2" style={{ margin: "26px 0 14px", lineHeight: 1.06, letterSpacing: -2.5 }}>
                <span style={{ display: "block", fontSize: "clamp(46px, 8vw, 76px)", fontWeight: 900, background: `linear-gradient(90deg, ${C.local}, #FFB35C)`, WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>경력이 되는 알바,</span>
                <span style={{ display: "block", fontSize: "clamp(46px, 8vw, 76px)", fontWeight: 900, background: "linear-gradient(90deg, #7EA0FF, #B9CBFF)", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>시간이 되는 채용.</span>
              </h1>
              <div className="hero-line3" style={{ fontSize: "clamp(17px, 2.6vw, 22px)", fontWeight: 800, marginBottom: 10 }}>
                맞는 알바는 <span style={{ color: "#FF9A5C" }}>이력서 첫 줄</span>이 되고, 맞는 채용은 <span style={{ color: "#9FB6FF" }}>1년의 시간</span>이 됩니다.
              </div>
              <p className="hero-line3" style={{ fontSize: 14.5, color: "#B9BFCC", lineHeight: 1.75, maxWidth: 540, margin: "0 0 20px" }}>
                아무 알바는 시급에서 끝나지만, 적성에 맞는 알바는 다음 직장의 경력이 됩니다.
                사장님께는 — 맞는 사람 하나가 <b style={{ color: "#fff" }}>교육 한 달과 재채용의 시간</b>을 지워드립니다.
                맞춤형 적성 검사로, 걸어갈 거리에서, 서로에게 맞는 사람과 일을 연결합니다.
              </p>
              <div className="hero-line3" style={{ display: "flex", gap: 4, marginBottom: 22, fontSize: 26, flexWrap: "wrap" }}>
                {CHARACTERS.map(c => <span key={c.id} title={c.name}>{c.emoji}</span>)}
                <span style={{ fontSize: 12.5, color: "#9AA1B0", fontWeight: 700, alignSelf: "center", marginLeft: 8 }}>나는 8가지 유형 중 무엇일까?</span>
              </div>
              <div className="hero-line3" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 30 }}>
                <button className="cta-glow" style={{ ...btn(C.local), fontSize: 17, padding: "16px 30px", borderRadius: 14 }}
                  onClick={() => { setMode("worker"); resetTest(); }}>
                  90초 만에 내 유형 확인 →
                </button>
                <button style={{ ...btn("rgba(255,255,255,.08)", "#fff"), fontSize: 16, padding: "16px 26px", borderRadius: 14, border: "1.5px solid rgba(255,255,255,.35)" }}
                  onClick={() => setMode("company")}>
                  동네 인재 채용하기
                </button>
              </div>
              <div style={{ display: "flex", gap: 26, flexWrap: "wrap", paddingBottom: 26 }}>
                {[["1개월", "미스매칭 시 낭비되는 교육"], ["2.8배", "핏 80점+ 근속"], [`${WEEKLY_DONE}명`, "이번 주 강동구 검사 완료"]].map(([n, l]) => (
                  <div key={l}>
                    <div style={{ fontSize: 26, fontWeight: 900 }}>{n}</div>

            <div style={{ position: "relative", margin: "0 -34px", background: "rgba(0,0,0,.35)", borderTop: "1px solid rgba(255,255,255,.1)", padding: "11px 0", overflow: "hidden" }}>
              <div style={{ display: "inline-block", whiteSpace: "nowrap", animation: "marquee 30s linear infinite", fontSize: 12.5, fontWeight: 700, color: "#D8DCE6" }}>
                <span style={{ paddingRight: 60 }}>{ticker}</span><span style={{ paddingRight: 60 }}>{ticker}</span>
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginTop: 14 }}>
            {STAGES.map((s, i) => (
              <div key={s.name} style={{ ...card, borderTop: `4px solid ${s.color}` }}>
                <Chip bg={s.soft} color={s.color}>{i + 1}단계 · 5문항</Chip>
                <div style={{ fontSize: 16.5, fontWeight: 800, margin: "10px 0 4px" }}>{s.name}</div>
                <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6 }}>{s.sub}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ================= 검사 =================
  if (mode === "worker" && phase !== "result") {
    const st = STAGES[stage];
    const isChoice = stage === 2;
    const items = stage === 0 ? STAGE1 : stage === 1 ? stage2Items : stage3Items;
    const stageAnswered = isChoice
      ? stage3Items.filter(({ key }) => prefs[key]).length
      : stage === 0
        ? STAGE1.filter((_, i) => likert[i] != null).length
        : stage2Items.filter(qu => likert[5 + TRAIT_IDX[qu.t]] != null).length;
    const stageDone = stageAnswered === items.length;

    if (phase === "rest") {
      const t1 = myTypes[0], t2 = myTypes[1];
      const next = STAGES[stage + 1];
      const blurPx = stage === 0 ? 7 : 3;
      return (
        <div style={shell}>
          <style>{css}</style>
          {Header}
          <div style={{ width: "100%", maxWidth: 560, padding: "40px 20px 60px" }}>
            <div style={{ ...card, textAlign: "center", padding: "34px 24px", animation: "popIn .5s ease both" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: st.color, marginBottom: 12 }}>{stage + 1}단계 완료 ✓</div>
              <div className="teaser-emoji" style={{ fontSize: 74, filter: `blur(${blurPx}px)`, marginBottom: 6, display: "inline-block" }}>{t1.emoji}</div>
              <div style={{ fontSize: 20, fontWeight: 900, marginBottom: 4 }}>
                당신은 <span style={{ color: C.local }}>{t1.name}</span>에 가까워지고 있어요
              </div>
              <p style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.7, margin: "0 0 14px" }}>
                하지만 아직 몰라요 — 남은 답변에 따라 <b>{t2.emoji} {t2.name}</b>(으)로 바뀔 수도 있습니다.<br />
                {stage === 0
                  ? "2단계 문항은 방금 하신 답변에 맞춰 새로 구성됐어요."
                  : "마지막 단계는 당신의 강점에 맞춘 조건 질문입니다!"}
              </p>
              <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginBottom: 16 }}>
                <Chip bg={C.localSoft} color={C.local}>벌써 {stage === 0 ? "30초" : "1분"} 투자하셨어요 — 답변이 아까우니까요 😉</Chip>
                <Chip>이번 주 강동구 {WEEKLY_DONE}명 검사 완료</Chip>
              </div>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: next.soft, borderRadius: 12, padding: "10px 16px", marginBottom: 18 }}>
                <span style={{ fontSize: 12.5, fontWeight: 800, color: next.color }}>다음 · {stage + 2}단계 {next.name}</span>
                <span style={{ fontSize: 12, color: C.sub }}>{stage === 0 ? "맞춤 5문항 · 약 40초" : "마지막 5문항 · 30초면 끝! ⚡"}</span>
              </div>
              <div>
                <button style={{ ...btn(next.color), fontSize: 16, padding: "14px 34px" }}
                  onClick={() => { setStage(stage + 1); setPhase("quiz"); setQIdx(0); }}>
                  계속하기 →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const qu = items[qIdx];
    const advance = () => {
      if (qIdx < items.length - 1) setQIdx(qIdx + 1);
      else if (stage < 2) setPhase("rest");
      else setPhase("result");
    };
    const stepper = [
      { label: "동네 인증", state: "done", color: C.local },
      ...STAGES.map((s, i) => ({ label: `${i + 1}단계 ${s.name}`, state: i < stage ? "done" : i === stage ? "now" : "todo", color: s.color, soft: s.soft, prog: i === stage ? stageAnswered / items.length : 0 })),
    ];
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 620, padding: "16px 20px 60px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {stepper.map(s => (
              <div key={s.label} style={{ flex: 1, textAlign: "center" }}>
                <div style={{ height: 6, borderRadius: 99, background: s.state === "done" ? s.color : s.state === "now" ? s.soft : "#E9EBE3", overflow: "hidden" }}>
                  {s.state === "now" && <div style={{ width: `${s.prog * 100}%`, height: "100%", background: s.color, transition: "width .25s" }} />}
                </div>
                <div style={{ fontSize: 10.5, fontWeight: 800, marginTop: 5, color: s.state === "now" ? s.color : s.state === "done" ? C.ink : "#B7BCC6" }}>
                  {s.label}{s.state === "done" ? " ✓" : ""}
                </div>
              </div>
            ))}
          </div>

          <div style={{ ...card, animation: "popIn .35s ease both" }} key={`${stage}-${qIdx}`}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
              <Chip bg={st.soft} color={st.color}>{stage + 1}단계 · {st.name}</Chip>
              <span style={{ fontSize: 12, fontWeight: 700, color: isChoice ? C.local : C.sub }}>
                {isChoice ? `마지막 단계 ⚡ ${qIdx + 1} / ${items.length}` : `${qIdx + 1} / ${items.length}`}
              </span>
            </div>
            {/* 적응형 문항인 이유 — 개인화가 느껴지는 순간 */}
            {stage === 1 && qu.why && (
              <div style={{ fontSize: 11.5, fontWeight: 700, color: C.company, background: C.companySoft, display: "inline-block", borderRadius: 8, padding: "4px 10px", marginBottom: 8 }}>
                🎯 맞춤 문항 · {qu.why}
              </div>
            )}
            {stage === 2 && qu.adaptive && (
              <div style={{ fontSize: 11.5, fontWeight: 700, color: C.local, background: C.localSoft, display: "inline-block", borderRadius: 8, padding: "4px 10px", marginBottom: 8 }}>
                🎯 {qu.whyName}이(가) 강점인 당신께 드리는 질문
              </div>
            )}
            <div style={{ fontSize: 20, fontWeight: 800, lineHeight: 1.5, marginBottom: 20 }}>{qu.q}</div>
            {isChoice ? (
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {qu.options.map(op => {
                  const on = prefs[qu.key] === op;
                  return (
                    <button key={op} onClick={() => { setPrefs({ ...prefs, [qu.key]: op }); setTimeout(advance, 180); }}
                      style={{ padding: "13px 20px", borderRadius: 14, cursor: "pointer", fontFamily: font, fontSize: 15, fontWeight: on ? 800 : 600, border: `1.5px solid ${on ? st.color : C.line}`, background: on ? st.soft : C.paper, color: on ? st.color : C.ink }}>
                      {op}
                    </button>
                  );
                })}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {SCALE.map((label, i) => {
                  const val = i + 1;
                  const gIdx = stage === 0 ? qIdx : 5 + TRAIT_IDX[qu.t];
                  const on = likert[gIdx] === val;
                  return (
                    <button key={label} onClick={() => {
                      const next = [...likert]; next[gIdx] = val; setLikert(next);
                      setTimeout(advance, 160);
                    }} style={{ textAlign: "left", padding: "12px 16px", borderRadius: 12, cursor: "pointer", fontFamily: font, fontSize: 14.5, fontWeight: on ? 800 : 600, border: `1.5px solid ${on ? st.color : C.line}`, background: on ? st.soft : C.paper, color: on ? st.color : C.ink }}>
                      {label}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14 }}>
            <button disabled={qIdx === 0} onClick={() => setQIdx(qIdx - 1)}
              style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, opacity: qIdx === 0 ? 0.4 : 1, padding: "10px 18px", fontSize: 13.5 }}>이전</button>
            {stageDone && qIdx === items.length - 1 && (
              <button style={{ ...btn(st.color), padding: "10px 20px", fontSize: 13.5 }}
                onClick={() => (stage < 2 ? setPhase("rest") : setPhase("result"))}>
                {stage < 2 ? "다음 단계 →" : "내 캐릭터 확인 →"}
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ================= 결과 =================
  if (mode === "worker" && phase === "result") {
    const me = myTypes[0];
    const goodMates = me.goodWith.map(id => CHAR_BY_ID[id]);
    const hardMate = me.hardWith ? CHAR_BY_ID[me.hardWith] : null;
    const sortTabs = [["total", "동네 추천순"], ["fit", "적성 핏순"], ["near", "가까운 순"]];
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 880, padding: "16px 20px 60px" }}>
          <div style={{
            borderRadius: 22, padding: "30px 26px", color: "#fff", marginBottom: 14, position: "relative", overflow: "hidden",
            background: "linear-gradient(135deg, #0D1220, #1C1533)", animation: "popIn .5s ease both",
          }}>
            <div style={{ position: "absolute", right: -50, top: -50, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(255,111,30,.4), transparent 65%)" }} />
            <div style={{ position: "relative", display: "flex", gap: 22, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ fontSize: 96, lineHeight: 1 }}>{me.emoji}</div>
              <div style={{ flex: "1 1 280px" }}>
                <div style={{ fontSize: 12.5, fontWeight: 800, color: C.gold }}>📍 {myDong} · 나의 알바 유형</div>
                <div style={{ fontSize: 30, fontWeight: 900, margin: "4px 0 2px" }}>{me.name} <span style={{ fontSize: 16, fontWeight: 700, color: "#B9BFCC" }}>— {me.title}</span></div>
                <div style={{ fontSize: 14.5, fontStyle: "italic", color: "#FFB35C", margin: "6px 0 10px" }}>{me.line}</div>
                <p style={{ fontSize: 13.5, color: "#C6CBD4", lineHeight: 1.65, margin: "0 0 12px" }}>{me.desc}</p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                  <Chip bg="rgba(255,255,255,.14)" color="#FFE0A8">{me.name} 일치도 {me.matchPct}%</Chip>
                  <Chip bg="rgba(14,155,108,.25)" color="#5FD9AE">👍 최고의 알바 · {me.best}</Chip>
                  <Chip bg="rgba(217,119,43,.22)" color="#FFB07A">💀 최악의 알바 · {me.worst}</Chip>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Chip bg="rgba(46,86,232,.25)" color="#9FB6FF">💚 잘 맞는 사장님 · {goodMates.map(g => `${g.emoji}${g.name}`).join(" ")}</Chip>
                  {hardMate && <Chip bg="rgba(255,255,255,.1)" color="#C6CBD4">⚡ 티격태격 · {hardMate.emoji}{hardMate.name}</Chip>}
                </div>
                <div style={{ fontSize: 10.5, color: "#8890A0", marginTop: 10 }}>
                  * 일치도는 검사 척도 기준 계산값입니다. 지역 퍼센타일은 {myDong} 표본 100명 달성 시 공개됩니다 (현재 {SAMPLE_N}명 · 베타)
                </div>
              </div>
            </div>
          </div>

          <div style={{ ...card, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: C.worker, marginBottom: 10 }}>성향 상세 · 희망 조건</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
              {TRAITS.map(({ key, name, desc }) => (
                <div key={key} style={{ flex: "1 1 140px", background: "#F8F9F5", borderRadius: 12, padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 13, fontWeight: 800 }}>{name}</span>
                    <span style={{ fontSize: 16, fontWeight: 900, color: C.worker }}>{profile[key]}</span>
                  </div>
                  <div style={{ height: 6, background: "#E9EBE3", borderRadius: 99, margin: "8px 0 6px", overflow: "hidden" }}>
                    <div style={{ width: `${profile[key]}%`, height: "100%", background: C.worker }} />
                  </div>
                  <div style={{ fontSize: 11, color: C.sub }}>{desc}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {stage3Items.map(({ key }) => prefs[key] && prefs[key] !== "무관" && prefs[key] !== "금액보다 적성 우선" && (
                <Chip key={key} bg={C.localSoft} color={C.local}>희망 · {prefs[key]}</Chip>
              ))}
              {prefs.pay && <Chip bg={C.companySoft} color={C.company}>매칭 모드 · {payProfile(prefs.pay).label}</Chip>}
              <button onClick={resetTest} style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, padding: "5px 12px", fontSize: 12, borderRadius: 999 }}>다시 검사</button>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "6px 4px 10px", flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 15, fontWeight: 800 }}>{me.emoji} {me.name}에게 맞는 공고</div>
            <div style={{ display: "flex", gap: 6 }}>
              {sortTabs.map(([k, label]) => (
                <button key={k} onClick={() => setSortKey(k)} style={{ padding: "6px 12px", borderRadius: 999, fontSize: 12.5, fontWeight: 700, fontFamily: font, cursor: "pointer", border: `1.5px solid ${sortKey === k ? C.local : C.line}`, background: sortKey === k ? C.localSoft : C.paper, color: sortKey === k ? C.local : C.sub }}>{label}</button>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {rankedJobs.map((j, i) => {
              const dt = distTone(j.walk);
              const boss = CHAR_BY_ID[j.bossType];
              return (
                <div key={j.id} style={{ ...card, borderLeft: i === 0 ? `4px solid ${C.local}` : `1px solid ${C.line}` }}>
                  <div style={{ display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
                    <div style={{ display: "flex", gap: 8 }}>
                      <ScoreDial score={j.total} label="종합" />
                      <ScoreDial score={j.fit} label="적성 핏" />
                    </div>
                    <div style={{ flex: "1 1 260px" }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                        <span style={{ fontSize: 16.5, fontWeight: 800 }}>{j.title}</span>
                        {i === 0 && <Chip bg={C.localSoft} color={C.local}>우리 동네 최적</Chip>}
                      </div>
                      <div style={{ fontSize: 12.5, color: C.sub, margin: "3px 0 8px" }}>
                        {j.org} · 📍 {j.dong} · {j.pay} · 사장님 {boss.emoji}{boss.name}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                        <Chip bg={dt.bg} color={dt.color}>{dt.label}</Chip>
                        {j.cp.label && <Chip bg={j.cp.bonus > 0 ? C.companySoft : "#FDEDE7"} color={j.cp.bonus > 0 ? C.company : C.warn}>사장님 {j.cp.label}</Chip>}
                        {j.matched.map(m => <Chip key={m} bg={C.workerSoft} color={C.worker}>✓ {m}</Chip>)}
                        {j.ab.bonus > 0 && <Chip bg={C.localSoft} color={C.local}>맞춤 조건 +{j.ab.bonus}점</Chip>}
                        {j.meet > 0 && <Chip bg={C.companySoft} color={C.company}>시급 조건 충족 +{j.meet}점</Chip>}
                        {j.pen > 0 && <Chip bg="#FDEDE7" color={C.warn}>희망 시급 미달 −{j.pen}점</Chip>}
                        {j.tags.map(t => <Chip key={t}>{t}</Chip>)}
                        <Chip bg={C.companySoft} color={C.company}>예상 근속 {tenureMonths(j.total)}개월</Chip>
                      </div>
                      <FitGauge user={profile} req={j.req} leftColor={C.worker} rightColor="#9AA3B0" />
                      <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.6, marginTop: 10, background: "#F8F9F5", borderRadius: 10, padding: "10px 12px" }}>{j.note}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ================= 기업 모드 =================
  const bossChar = CHAR_BY_ID[effectiveBoss];
  return (
    <div style={shell}>
      <style>{css}</style>
      {Header}
      <div style={{ width: "100%", maxWidth: 880, padding: "16px 20px 60px" }}>
        <div style={{ ...card, marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: C.company }}>공고 설정</div>
          <div style={{ fontSize: 19, fontWeight: 900, margin: "6px 0 4px" }}>어느 동네에서, 어떤 성향이 필요한가요</div>
          <p style={{ fontSize: 12.5, color: C.sub, margin: "0 0 14px" }}>근무지 동네·필요 성향·사장님 유형을 설정하면 잘 맞는 지원자부터 정렬됩니다.</p>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", marginBottom: 16 }}>
            <input value={jobTitle} onChange={e => setJobTitle(e.target.value)} style={{ flex: "1 1 260px", boxSizing: "border-box", padding: "11px 14px", borderRadius: 10, border: `1.5px solid ${C.line}`, fontSize: 14.5, fontWeight: 700, fontFamily: font, outline: "none" }} />
            <DongPicker value={jobDong} onChange={setJobDong} accent={C.company} />
          </div>

          {/* ----- 사장님 유형: 30초 검사(기본) / 직접 선택 ----- */}
          <div style={{ background: "#F8F9F5", borderRadius: 14, padding: 16, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
              <div style={{ fontSize: 13.5, fontWeight: 800 }}>사장님(팀장)은 어떤 유형이세요? <span style={{ fontWeight: 600, color: C.sub, fontSize: 12 }}>— 궁합 ±5점 반영 (참고 지표)</span></div>
              <div style={{ display: "flex", gap: 4 }}>
                {[["quiz", "30초 검사 (추천)"], ["manual", "직접 선택"]].map(([k, label]) => (
                  <button key={k} onClick={() => setBossTab(k)} style={{
                    padding: "5px 12px", borderRadius: 999, fontSize: 12, fontWeight: 700, fontFamily: font, cursor: "pointer",
                    border: `1.5px solid ${bossTab === k ? C.company : C.line}`,
                    background: bossTab === k ? C.companySoft : C.paper, color: bossTab === k ? C.company : C.sub,
                  }}>{label}</button>
                ))}
              </div>
            </div>

            {bossTab === "quiz" ? (
              <div>
                <div style={{ fontSize: 11.5, color: C.sub, marginBottom: 10 }}>
                  둘 다 좋은 답입니다 — 더 솔직한 쪽을 고르세요. 정답도 미화도 없습니다.
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {BOSS_QUIZ.map((qz, i) => (
                    <div key={qz.q} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ fontSize: 13, fontWeight: 700 }}>{i + 1}. {qz.q}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {["a", "b"].map(side => {
                          const on = bossAnswers[i] === side;
                          return (
                            <button key={side} onClick={() => {
                              const next = [...bossAnswers]; next[i] = side; setBossAnswers(next);
                            }} style={{
                              flex: "1 1 200px", textAlign: "left", padding: "9px 13px", borderRadius: 10, cursor: "pointer",
                              fontFamily: font, fontSize: 12.5, fontWeight: on ? 800 : 600,
                              border: `1.5px solid ${on ? C.company : C.line}`,
                              background: on ? C.companySoft : C.paper, color: on ? C.company : C.ink,
                            }}>{qz[side]}</button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                {bossDone && bossResult && (
                  <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 10, background: C.companySoft, borderRadius: 12, padding: "10px 14px", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 30 }}>{bossResult.emoji}</span>
                    <div>
                      <div style={{ fontSize: 14.5, fontWeight: 900, color: C.company }}>검사 결과 · {bossResult.name} <span style={{ fontWeight: 700, fontSize: 12 }}>(일치도 {bossResult.matchPct}%)</span></div>
                      <div style={{ fontSize: 12, color: C.sub }}>{bossResult.title} — 아래 지원자 순위에 궁합이 반영되었습니다.</div>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {CHARACTERS.map(c => {
                  const on = bossType === c.id;
                  return (
                    <button key={c.id} onClick={() => setBossType(c.id)} style={{
                      padding: "8px 13px", borderRadius: 999, cursor: "pointer", fontFamily: font, fontSize: 13,
                      fontWeight: on ? 800 : 600, border: `1.5px solid ${on ? C.company : C.line}`,
                      background: on ? C.companySoft : C.paper, color: on ? C.company : C.ink,
                    }}>{c.emoji} {c.name}</button>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "10px 22px" }}>
            {TRAITS.map(({ key, name }) => (
              <div key={key}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, fontWeight: 700, marginBottom: 4 }}>
                  <span>{name}</span><span style={{ color: C.company }}>{jobReq[key]}</span>
                </div>
                <input type="range" min={0} max={100} value={jobReq[key]}
                  onChange={e => setJobReq({ ...jobReq, [key]: Number(e.target.value) })}
                  style={{ width: "100%", accentColor: C.company }} />
              </div>
            ))}
          </div>
        </div>

        <div style={{ fontSize: 15, fontWeight: 800, margin: "6px 4px 10px" }}>
          「{jobTitle}」 · 📍 {jobDong} · 사장님 {bossChar.emoji}{bossChar.name} 기준 지원자
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {rankedApplicants.map((a, i) => {
            const dt = distTone(a.walk);
            return (
              <div key={a.name} style={{ ...card, borderLeft: i === 0 ? `4px solid ${C.company}` : `1px solid ${C.line}` }}>
                <div style={{ display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <ScoreDial score={a.total} label="종합" />
                    <ScoreDial score={a.fit} label="적성 핏" />
                  </div>
                  <div style={{ flex: "1 1 260px" }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ fontSize: 16, fontWeight: 800 }}>{a.type.emoji} {a.name}</span>
                      <Chip bg={C.workerSoft} color={C.worker}>{a.type.name}</Chip>
                      <span style={{ fontSize: 12.5, color: C.sub }}>{a.age}세 · 📍 {a.dong} · {a.exp}</span>
                      {i === 0 && <Chip bg={C.companySoft} color={C.company}>추천 1순위</Chip>}
                    </div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", margin: "8px 0 10px" }}>
                      <Chip bg={dt.bg} color={dt.color}>{dt.label}</Chip>
                      {a.cp.label && <Chip bg={a.cp.bonus > 0 ? C.companySoft : "#FDEDE7"} color={a.cp.bonus > 0 ? C.company : C.warn}>{a.cp.label}</Chip>}
                      <Chip bg={C.companySoft} color={C.company}>예상 근속 {tenureMonths(a.total)}개월</Chip>
                      {a.total >= 80 && <Chip bg={C.workerSoft} color={C.worker}>숙련 투자 회수 가능</Chip>}
                      {a.total < 60 && <Chip>조기 이탈 위험</Chip>}
                    </div>
                    <FitGauge user={a.traits} req={jobReq} leftColor={C.company} rightColor="#9AA3B0" />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AlbaFitV7 />);

</script>
</body>
</html>
